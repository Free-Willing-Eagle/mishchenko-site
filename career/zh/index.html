<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet" />
  <title>乔治·米先科</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&family=Noto+Serif+SC:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0c12;
      --surface: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08);
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --text: #f0ede8;
      --muted: rgba(240,237,232,0.5);
      --card-hover: rgba(255,255,255,0.07);
    }

    html, body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans SC', 'DM Sans', sans-serif;
      font-weight: 300;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 50% -10%, rgba(201,168,76,0.12) 0%, transparent 70%),
        radial-gradient(ellipse 40% 30% at 80% 80%, rgba(30,40,80,0.4) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      opacity: 0.4;
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      max-width: 480px;
      margin: 0 auto;
      padding: 60px 24px 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .lang-switch {
      align-self: flex-end;
      margin-bottom: 32px;
      display: flex;
      gap: 8px;
    }
    .lang-switch a {
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      border: 1px solid var(--border);
      padding: 6px 14px;
      border-radius: 20px;
      transition: all 0.25s;
    }
    .lang-switch a:hover {
      color: var(--gold);
      border-color: var(--gold);
    }

    .photo-wrap {
      position: relative;
      width: 110px;
      height: 110px;
      margin-bottom: 28px;
      animation: fadeDown 0.8s ease both;
    }
    .photo-wrap::before {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      background: conic-gradient(var(--gold), var(--gold-light), var(--gold));
      z-index: -1;
      animation: spinSlow 8s linear infinite;
    }
    .photo-wrap img {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      object-fit: cover;
      object-position: top center;
      display: block;
      border: 3px solid var(--bg);
    }

    .name {
      font-family: 'Noto Serif SC', serif;
      font-size: 2.2rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-align: center;
      animation: fadeDown 0.8s 0.1s ease both;
      background: linear-gradient(135deg, var(--text) 60%, var(--gold-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .title-line {
      font-size: 0.82rem;
      font-weight: 400;
      letter-spacing: 0.1em;
      color: var(--gold);
      text-align: center;
      margin-top: 6px;
      margin-bottom: 20px;
      animation: fadeDown 0.8s 0.2s ease both;
    }

    .bio {
      font-size: 0.92rem;
      line-height: 1.85;
      color: var(--muted);
      text-align: center;
      max-width: 380px;
      margin-bottom: 40px;
      animation: fadeDown 0.8s 0.3s ease both;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin-bottom: 36px;
      animation: fadeDown 0.8s 0.35s ease both;
    }

    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .link-card {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 22px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      text-decoration: none;
      color: var(--text);
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
      width: 100%;
      font-family: inherit;
      cursor: pointer;
      text-align: left;
    }
    button.link-card {
      font-size: inherit;
    }

    .wechat-toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(20, 24, 32, 0.95);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(201,168,76,0.3);
      color: var(--text);
      padding: 14px 24px;
      border-radius: 12px;
      font-size: 0.92rem;
      font-family: 'Noto Sans SC', sans-serif;
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 100;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .wechat-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .wechat-toast::before {
      content: '✓';
      color: var(--gold);
      margin-right: 8px;
      font-weight: 600;
    }

    .link-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(201,168,76,0.08), transparent);
      opacity: 0;
      transition: opacity 0.25s;
    }

    .link-card:hover {
      border-color: rgba(201,168,76,0.3);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    .link-card:hover::before { opacity: 1; }

    .link-card:nth-child(1) { animation: fadeUp 0.6s 0.4s ease both; }
    .link-card:nth-child(2) { animation: fadeUp 0.6s 0.5s ease both; }
    .link-card:nth-child(3) { animation: fadeUp 0.6s 0.6s ease both; }
    .link-card:nth-child(4) { animation: fadeUp 0.6s 0.7s ease both; }
    .link-card:nth-child(5) { animation: fadeUp 0.6s 0.8s ease both; }
    .link-card:nth-child(6) { animation: fadeUp 0.6s 0.9s ease both; }
    .link-card:nth-child(7) { animation: fadeUp 0.6s 1.0s ease both; }

    .link-icon {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 1.2rem;
    }

    .icon-linkedin { background: rgba(10,102,194,0.2); }
    .icon-whatsapp { background: rgba(37,211,102,0.15); }
    .icon-wechat   { background: rgba(9,187,7,0.15); }
    .icon-telegram { background: rgba(0,136,204,0.15); }
    .icon-phone    { background: rgba(120,200,255,0.12); }
    .icon-email    { background: rgba(201,168,76,0.12); }
    .icon-cv       { background: rgba(255,255,255,0.06); }

    .link-text {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .link-label {
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      color: var(--muted);
      text-transform: uppercase;
    }
    .link-value {
      font-size: 0.96rem;
      font-weight: 400;
      color: var(--text);
    }

    .link-arrow {
      margin-left: auto;
      color: var(--muted);
      font-size: 1rem;
      transition: transform 0.2s;
    }
    .link-card:hover .link-arrow {
      transform: translateX(3px);
      color: var(--gold);
    }

    .footer {
      margin-top: 52px;
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(240,237,232,0.2);
      font-family: 'DM Sans', sans-serif;
      animation: fadeDown 0.8s 1s ease both;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes spinSlow {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
  </style>

<script>
  function copyWechat(btn) {
    const wechatId = btn.getAttribute('data-wechat');
    const toast = document.getElementById('wechatToast');

    // Try modern Clipboard API first
    if (navigator.clipboard && window.isSecureContext) {
      navigator.clipboard.writeText(wechatId).then(() => showToast(toast));
    } else {
      // Fallback for older browsers
      const textarea = document.createElement('textarea');
      textarea.value = wechatId;
      textarea.style.position = 'fixed';
      textarea.style.opacity = '0';
      document.body.appendChild(textarea);
      textarea.select();
      try {
        document.execCommand('copy');
        showToast(toast);
      } catch (err) {
        console.error('Copy failed:', err);
      }
      document.body.removeChild(textarea);
    }
  }

  function showToast(toast) {
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2400);
  }
</script>
